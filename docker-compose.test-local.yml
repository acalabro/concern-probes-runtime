# ══════════════════════════════════════════════════════════════════════════════
# docker-compose.test-local.yml
#
# Avvia il probe runtime collegandolo alla stessa rete di
# Concern_Monitoring_Infrastructure, così può raggiungere il broker
# ActiveMQ embedded in concern-backend direttamente tramite container name.
#
# Uso:
#   # Prima trova il nome della rete del monitor:
#   docker network ls | grep concern
#   # Poi imposta CONCERN_NETWORK nel .env.test-local e avvia:
#   export UID GID
#   docker compose --env-file .env.test-local -f docker-compose.test-local.yml up --build
# ══════════════════════════════════════════════════════════════════════════════

services:

  probes:
    build: .
    container_name: concern-probes-test
    ports:
      - "${HTTP_PORT:-8080}:8080"
    user: "${UID:-1000}:${GID:-1000}"

    # Necessario su Linux per host.docker.internal (fallback se la rete non è disponibile)
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      PROBE_NODE_ID:   ${PROBE_NODE_ID:-test-local-01}
      ADMIN_TOKEN:     ${ADMIN_TOKEN:-change-me-admin}
      HTTP_PORT:       8080
      BUFFER_DB_PATH:  /app/data/buffer.sqlite
      BROKER_URL:      ${BROKER_URL:-tcp://concern-backend:61616}
      MYSQL_HOST:      ${MYSQL_HOST:-concern-mysql}
      MYSQL_PORT:      ${MYSQL_PORT:-3306}
      MYSQL_DATABASE:  ${MYSQL_DATABASE:-eventdb}
      MYSQL_USER:      ${MYSQL_USER:-concern}
      MYSQL_PASSWORD:  ${MYSQL_PASSWORD:-un53cur3!!}

    volumes:
      - ./config:/app/config
      - probes-test-data:/app/data

    restart: unless-stopped

    networks:
      - probes-local         # rete interna del probe runtime
      - concern-monitor-net  # rete esterna del monitor (vedi sotto)

volumes:
  probes-test-data: {}

networks:
  # Rete interna del probe runtime
  probes-local:
    driver: bridge

  # Rete ESTERNA del monitor — deve esistere già (avviata da Concern_Monitoring_Infrastructure).
  # Il nome esatto dipende dalla directory dove hai clonato il monitor.
  # Scoprilo con: docker network ls | grep concern
  # Tipicamente è: concern_monitoring_infrastructure_concern-network
  # o semplicemente: concern_concern-network
  concern-monitor-net:
    external: true
    name: ${CONCERN_NETWORK:-concern_monitoring_infrastructure_concern-network}
