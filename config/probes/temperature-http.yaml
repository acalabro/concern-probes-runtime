# POST /ingest/ConcernTemperatureProbe with a JSON body to push an event.
# curl -X POST http://localhost:8080/ingest/ConcernTemperatureProbe \
#      -H 'Content-Type: application/json' \
#      -H 'Authorization: Bearer change-me-token' \
#      -d '{"value": 38.2, "sensorId": "DS-A1"}'

id:        temperature-http
name:      "ConcernTemperatureProbe"
probeType: "ConcernTemperatureProbe"

broker:
  url:      "tcp://activemq:61616"
  username: "system"
  password: "manager"
  topic:    "DROOLS-InstanceOne"

ingest:
  enabled:  true
  path:     "ConcernTemperatureProbe"
  authToken: "change-me-token"
  payloadMode: passthrough

eventTemplate:
  name:          "TemperatureReading"
  destinationId: "Monitoring"
  cepType:       "DROOLS"
  dataField:     "${payload.value}"

buffer:
  enabled: true

autoStart: true
