# ══════════════════════════════════════════════════════════════════════════════
# Probe di test locale — si connette al broker embedded del monitor
#
# Usata con il profilo test-local. Genera eventi sintetici ogni 2 secondi
# e li invia al topic DROOLS-InstanceOne già in ascolto sul monitor.
# Espone anche POST /ingest/ConcernTestProbe per push manuali.
#
# Verifica ricezione sul monitor: controlla i log Drools o il DB MySQL.
# ══════════════════════════════════════════════════════════════════════════════

id:        test-local-synthetic
name:      "ConcernTestProbe"
probeType: "ConcernTestProbe"
description: "Probe di test locale — broker embedded del monitor"

broker:
  url:      "tcp://host.docker.internal:61616"
  username: "system"
  password: "manager"
  topic:    "DROOLS-InstanceOne"
  trustedPackages: "it.cnr.isti.labsedc.concern,java.lang,java.util,javax.security"

source:
  type: synthetic
  config:
    intervalMs: 2000      # 1 evento ogni 2 secondi
    valueMin:   0
    valueMax:   100

ingest:
  enabled:     true
  path:        "ConcernTestProbe"
  authToken:   ""          # aperto in test
  payloadMode: passthrough

eventTemplate:
  name:          "TestReading"
  destinationId: "Monitoring"
  cepType:       "DROOLS"
  dataField:     "${payload.value}"

buffer:
  enabled:             true
  maxSizeMB:           10
  retryIntervalSeconds: 10

autoStart: true
